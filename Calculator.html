<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    :root {
      --bg: #1f2937;
      --panel: #111827;
      --button: #374151;
      --button-hover: #4b5563;
      --primary: #f9fafb;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #3b82f6 0%, #1f2937 55%);
      color: var(--primary);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .calculator {
      width: min(100%, 360px);
      background: var(--panel);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.45);
      padding: 24px;
    }

    .display {
      width: 100%;
      height: 84px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(148, 163, 184, 0.12);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      gap: 4px;
      margin-bottom: 22px;
      font-size: 1.6rem;
      overflow-wrap: break-word;
      word-break: break-all;
    }

    .display .history {
      font-size: 0.9rem;
      color: #94a3b8;
      opacity: 0.9;
    }

    .display .current {
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--primary);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 18px 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary);
      background: var(--button);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.16);
    }

    button:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .span-two {
      grid-column: span 2;
    }

    .operator {
      background: var(--accent);
    }

    .operator:hover {
      background: var(--accent-hover);
    }

    .clear {
      background: #7c3aed;
    }

    .clear:hover {
      background: #8b5cf6;
    }

    .delete {
      background: var(--danger);
    }

    .delete:hover {
      background: #ef4444;
    }

    @media (max-width: 400px) {
      .calculator {
        padding: 18px;
      }

      .display {
        height: 76px;
        padding: 16px;
      }

      button {
        padding: 16px 0;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="history" id="history">&nbsp;</div>
      <div class="current" id="current">0</div>
    </div>

    <div class="buttons">
      <button class="span-two clear" data-action="clear">AC</button>
      <button class="delete" data-action="delete">DEL</button>
      <button class="operator" data-action="operator">/</button>

      <button data-action="number">7</button>
      <button data-action="number">8</button>
      <button data-action="number">9</button>
      <button class="operator" data-action="operator">*</button>

      <button data-action="number">4</button>
      <button data-action="number">5</button>
      <button data-action="number">6</button>
      <button class="operator" data-action="operator">-</button>

      <button data-action="number">1</button>
      <button data-action="number">2</button>
      <button data-action="number">3</button>
      <button class="operator" data-action="operator">+</button>

      <button data-action="number">0</button>
      <button data-action="decimal">.</button>
      <button class="span-two operator" data-action="equals">=</button>
    </div>
  </div>

  <script>
    const historyElement = document.getElementById('history');
    const currentElement = document.getElementById('current');
    const buttons = document.querySelectorAll('button');

    let currentValue = '0';
    let previousValue = '';
    let operator = null;
    let waitingForNextValue = false;

    function updateDisplay() {
      currentElement.textContent = currentValue;
      historyElement.textContent = previousValue ? `${previousValue} ${operator || ''}` : '\xa0';
    }

    function inputNumber(number) {
      if (waitingForNextValue) {
        currentValue = number;
        waitingForNextValue = false;
      } else {
        currentValue = currentValue === '0' ? number : currentValue + number;
      }
    }

    function inputDecimal() {
      if (waitingForNextValue) {
        currentValue = '0.';
        waitingForNextValue = false;
        return;
      }
      if (!currentValue.includes('.')) {
        currentValue += '.';
      }
    }

    function clearAll() {
      currentValue = '0';
      previousValue = '';
      operator = null;
      waitingForNextValue = false;
    }

    function deleteLast() {
      if (waitingForNextValue) return;
      currentValue = currentValue.length === 1 ? '0' : currentValue.slice(0, -1);
    }

    function calculate(nextOperator) {
      const current = parseFloat(currentValue);
      const previous = parseFloat(previousValue);

      if (operator === null || waitingForNextValue) {
        operator = nextOperator;
        return;
      }

      let result;
      switch (operator) {
        case '+':
          result = previous + current;
          break;
        case '-':
          result = previous - current;
          break;
        case '*':
          result = previous * current;
          break;
        case '/':
          result = current === 0 ? 'Error' : previous / current;
          break;
        default:
          return;
      }

      currentValue = String(result).slice(0, 16);
      operator = nextOperator;
      waitingForNextValue = true;
      previousValue = currentValue;
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        const action = button.dataset.action;
        const buttonText = button.textContent;

        switch (action) {
          case 'number':
            inputNumber(buttonText);
            break;
          case 'decimal':
            inputDecimal();
            break;
          case 'clear':
            clearAll();
            break;
          case 'delete':
            deleteLast();
            break;
          case 'operator':
            if (previousValue && !waitingForNextValue) {
              calculate(buttonText);
            } else {
              operator = buttonText;
              previousValue = currentValue;
              waitingForNextValue = true;
            }
            break;
          case 'equals':
            if (!operator || waitingForNextValue) break;
            calculate(null);
            operator = null;
            previousValue = '';
            waitingForNextValue = true;
            break;
        }

        updateDisplay();
      });
    });

    updateDisplay();
  </script>
</body>
</html>
